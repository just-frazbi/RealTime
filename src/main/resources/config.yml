# ==========================================
# RealTime - Configuration
# ==========================================

# Enable/disable time synchronization
enabled: true

# Time update interval in ticks (20 ticks = 1 second)
# Recommended value: 20-100
# Lower value = more accurate sync, but higher server load
update-interval: 20

# Timezone for synchronization
# Use 'auto' to automatically detect server timezone
# Or specify a timezone from the list below:
#
# Timezone examples:
#   Europe/Moscow      - Moscow (UTC+3)
#   Europe/Kiev        - Kyiv (UTC+2)
#   Europe/Minsk       - Minsk (UTC+3)
#   Europe/Riga        - Riga (UTC+2)
#   Europe/Tallinn     - Tallinn (UTC+2)
#   Europe/Vilnius     - Vilnius (UTC+2)
#   Asia/Almaty        - Almaty (UTC+6)
#   Asia/Tashkent      - Tashkent (UTC+5)
#   Asia/Yerevan       - Yerevan (UTC+4)
#   Asia/Baku          - Baku (UTC+4)
#   America/New_York   - New York (UTC-5)
#   America/Chicago    - Chicago (UTC-6)
#   America/Los_Angeles - Los Angeles (UTC-8)
#   Europe/London      - London (UTC+0)
#   Europe/Paris       - Paris (UTC+1)
#   Europe/Berlin      - Berlin (UTC+1)
#   Asia/Tokyo         - Tokyo (UTC+9)
#   Asia/Shanghai      - Shanghai (UTC+8)
#   Australia/Sydney   - Sydney (UTC+10)
#
# Full list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone: auto

# List of worlds where synchronization is enabled
# If empty - sync works in all worlds
# Uncomment and add your worlds:
enabled-worlds: []
#  - world
#  - world_nether
#  - world_the_end