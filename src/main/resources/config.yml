# RealTime Configuration File

# Включить/выключить синхронизацию времени
enabled: true

# Интервал обновления времени в тиках (20 тиков = 1 секунда)
# Рекомендуемое значение: 20-100
update-interval: 20

# Список миров, в которых включена синхронизация
# Пустой список = все миры
enabled-worlds: []
#  - world
#  - world_nether
#  - world_the_end
